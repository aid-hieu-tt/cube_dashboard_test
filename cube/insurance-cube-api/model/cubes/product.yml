cubes:
  - name: product
    sql_table: "public.\"Product\""
    data_source: default

    joins: []

    dimensions:
      - name: id
        sql: id
        type: number
        primary_key: true

      - name: description
        sql: description
        type: string

      - name: name
        sql: name
        type: string

      - name: createdat
        sql: "{CUBE}.\"createdAt\""
        type: time

    measures:
      - name: count
        type: count

      - name: price
        sql: price
        type: sum

    pre_aggregations:
      # Pre-aggregation definitions go here.
      # Learn more in the documentation: https://cube.dev/docs/caching/pre-aggregations/getting-started

